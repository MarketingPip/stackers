<!DOCTYPE html>
<html lang="en"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sedjs | Virtual Playground</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap');
        .font-mono { font-family: 'Fira Code', monospace; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen flex flex-col">

    <header class="border-b border-slate-800 p-4 bg-slate-900/50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2 rounded-lg">
                    <i class="fas fa-terminal text-white"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight">sed<span class="text-indigo-400">js</span> Playground</h1>
            </div>
            <div class="flex gap-4 text-sm font-medium">
                <span class="px-3 py-1 rounded-full bg-slate-800 border border-slate-700">POSIX Compliant</span>
                <span class="px-3 py-1 rounded-full bg-green-900/30 text-green-400 border border-green-800/50">v1.0.4-stable</span>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-7xl w-full mx-auto p-4 lg:p-8 grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <div class="lg:col-span-7 space-y-6">
            
            <div class="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden shadow-xl">
                <div class="p-4 border-b border-slate-800 bg-slate-800/30 flex justify-between items-center">
                    <span class="text-xs uppercase tracking-widest font-bold text-slate-400">Command Input</span>
                    <button id="runBtn" class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-1.5 rounded-lg text-sm font-bold transition-all flex items-center gap-2">
                        <i class="fas fa-play"></i> Run Script
                    </button>
                </div>
                <div class="p-6">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 mb-2 italic">Current Snippet:</label>
                            <div class="relative">
                                <textarea id="commandArea" class="w-full h-32 bg-slate-950 border border-slate-700 rounded-lg p-4 font-mono text-indigo-300 focus:ring-2 focus:ring-indigo-500 focus:outline-none transition-all" spellcheck="false">-e 's/[a-z]/\U&/g' -e '/[AEIOU]/ { h; s/./*/g; G; s/\n/ /; }'</textarea>
                            </div>
                        </div>
                      
                      <div>
                            <label class="block text-xs font-semibold text-slate-500 mb-2 italic">Standard Input (stdin)</label>
                            <div class="relative">
                                <textarea id="stdin" class="w-full h-32 bg-slate-950 border border-slate-700 rounded-lg p-4 font-mono text-indigo-300 focus:ring-2 focus:ring-indigo-500 focus:outline-none transition-all" spellcheck="false">sed is powerful
xyz</textarea>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <button onclick="loadSnippet('basic')" class="group p-4 bg-slate-900 border border-slate-800 rounded-xl hover:border-indigo-500 transition-all text-left">
                    <h3 class="font-bold text-indigo-400 group-hover:text-indigo-300">Basic Replace</h3>
                    <p class="text-xs text-slate-500 mt-1">Simple s/regexp/replacement/ on notes.txt</p>
                </button>
                <button onclick="loadSnippet('inplace')" class="group p-4 bg-slate-900 border border-slate-800 rounded-xl hover:border-emerald-500 transition-all text-left">
                    <h3 class="font-bold text-emerald-400 group-hover:text-emerald-300">In-place Edit (-i)</h3>
                    <p class="text-xs text-slate-500 mt-1">Modify the VFS object directly.</p>
                </button>
                <button onclick="loadSnippet('stdin')" class="group p-4 bg-slate-900 border border-slate-800 rounded-xl hover:border-orange-500 transition-all text-left">
                    <h3 class="font-bold text-orange-400 group-hover:text-orange-300">Global Stdin</h3>
                    <p class="text-xs text-slate-500 mt-1">Use global flag /g on a text string.</p>
                </button>
                <button onclick="loadSnippet('complex')" class="group p-4 bg-slate-900 border border-slate-800 rounded-xl hover:border-purple-500 transition-all text-left">
                    <h3 class="font-bold text-purple-400 group-hover:text-purple-300">JSON Manipulation</h3>
                    <p class="text-xs text-slate-500 mt-1">Target specific keys in config.json.</p>
                </button>
            </div>
        </div>

        <div class="lg:col-span-5 space-y-6">
            
            <div class="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden shadow-xl">
                <div class="p-4 border-b border-slate-800 bg-slate-800/30">
                    <span class="text-xs uppercase tracking-widest font-bold text-slate-400">Virtual File System (VFS)</span>
                </div>
                <div class="p-4 font-mono text-sm space-y-3" id="vfsMonitor">
                    </div>
            </div>

            <div class="bg-black border border-slate-800 rounded-xl overflow-hidden shadow-xl">
                <div class="p-4 border-b border-slate-800 bg-slate-900/50 flex justify-between items-center">
                    <span class="text-xs uppercase tracking-widest font-bold text-slate-400">Terminal Output</span>
                    <button onclick="clearConsole()" class="text-slate-500 hover:text-white transition-colors">
                        <i class="fas fa-trash-can text-xs"></i>
                    </button>
                </div>
                <div id="consoleLog" class="p-4 font-mono text-sm h-48 overflow-y-auto space-y-1">
                    <div class="text-slate-500 italic">> system initialized...</div>
                </div>
            </div> 
        </div>
    </main>
</body>
</html>
