name: Deploy Website to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Ensure root lockfile exists 🛠️
        run: |
          if [ ! -f package-lock.json ]; then
            npm i --package-lock-only
          fi


      # 1. Setup Node for the Webpack Game Build
      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'


      - name: Install dependencies and Build Game 🎮
        run: |
          npm install
          npx webpack --config ./src/webpack.config.js

      # 2. Setup Ruby for Jekyll
      - name: Setup Ruby 💎
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2' # Standard for 2026
          bundler-cache: true
          working-directory: website

      # 3. Build the Jekyll Website
      - name: Build Website with Jekyll 🏗️
        run: |
          # Move the game build into the Jekyll source folder so Jekyll processes it
          mkdir -p website/
          cp dist/game.html website/play-stackers.html
          
          # Run Jekyll build
          cd website
          bundle install
          bundle exec jekyll build
        env:
          JEKYLL_ENV: production



  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-and-deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
        # Specify the target branch for GitHub Pages deployment
            branch: gh-pages
        # Specify the directory containing the built static files
            folder: website/_site  # Or the folder where your Jekyll build output is stored
            clean: true

