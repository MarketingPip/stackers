name: Deploy Website to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Ensure root lockfile exists 🛠️
        run: |
          if [ ! -f package-lock.json ]; then
            npm i --package-lock-only
          fi

      # 1. Build the Webpack Game
      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies and Build Game 🎮
        run: |
          npm install
          npx webpack --config ./src/webpack.config.js

      # 2. Build the Jekyll Site
      - name: Setup Ruby 💎
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: website

      - name: Build Website with Jekyll 🏗️
        run: |
          # Move game output into Jekyll source folder
          mkdir -p website/
          cp dist/game.html website/play-stackers.html
          
          cd website
          # Ensure Jekyll knows the production URL (use your repo name)
          bundle exec jekyll build
        env:
          JEKYLL_ENV: production
          PAGES_REPO_NWO: ${{ github.repository }} # This provides "username/repo"

      - name: Create .nojekyll file 📄
        run: touch website/_site/.nojekyll
      # 3. Deploy to the gh-pages branch
      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: website/_site
          branch: gh-pages
          clean: true
        env:
         PAGES_REPO_NWO: ${{ github.repository }} # This provides "username/repo"
