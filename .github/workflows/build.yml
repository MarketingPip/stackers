name: Build Electron App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          #cache: npm

      # ✅ Use lockfile instead of reinstalling everything manually
      - name: Install dependencies
        run: npm install
        #run: npm ci

      # ✅ Build (cross-platform safe)
      - name: Build app
        run: npm run build:exe -- --publish=never
        env:
          NODE_ENV: production

      # ✅ Upload Windows artifacts
      - name: Upload Windows artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: stacker-windows
          path: |
            dist/**/*.exe
            dist/**/*.zip

      # ✅ Upload Linux artifacts
      - name: Upload Linux artifacts
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: stacker-linux
          path: |
            dist/**/*.AppImage
            dist/**/*.deb
            dist/**/*.tar.gz
