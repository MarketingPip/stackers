name: Deploy Website to GitHub Pages 

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # --- Build game (outputs to dist/game.html at repo root) ---
      - name: Ensure root lockfile exists 🛠️
        run: |
          if [ ! -f package-lock.json ]; then
            npm i --package-lock-only
          fi

      - name: Install root dependencies 🔧
        run: npm install

      # ✅ Manual install (fixed formatting + no duplicates)
      - name: Install dependencies (Linux)
        run: |
          npm install --save-dev \
            webpack \
            webpack-cli \
            webpack-dev-server \
            html-webpack-plugin \
            mini-css-extract-plugin \
            css-loader \
            style-loader \
            postcss \
            postcss-loader \
            tailwindcss \
            autoprefixer \
            html-inline-css-webpack-plugin \
            html-inline-script-webpack-plugin \
            html-loader
        if: matrix.os == 'ubuntu-latest'

      - name: Build game 🎮
        run: npx webpack --config ./src/webpack.config.js

      # --- Build website ---
      - name: Ensure website lockfile exists 🛠️
        run: |
          if [ ! -f package-lock.json ]; then
            npm i --package-lock-only
          fi
        working-directory: website

      - name: Install website dependencies 🔧
        run: npm install
        working-directory: website

      - name: Build website 🏗️
        run: npm run build:ghpages
        working-directory: website

      # --- Copy game output into website dist ---
      - name: Copy game.html into website dist 📋
        run: cp dist/game.html website/dist/play-stackers.html

      # --- Deploy ---
      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: website/dist
          branch: gh-pages
          clean: true
