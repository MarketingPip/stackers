name: Deploy Website to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Ensure root lockfile exists 🛠️
        run: |
          if [ ! -f package-lock.json ]; then
            npm i --package-lock-only
          fi

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 1. Build the Game (Root)
      - name: Build Game 🎮
        run: |
          npm install
          npx webpack --config ./src/webpack.config.js

      # 2. Build Website Assets
      - name: Build Website 🏗️
        working-directory: website
        run: |
          npm install
          npm run build:ghpages

      # 3. PREPARE: Move files into the Jekyll source folder
      # This ensures Jekyll "sees" them when the container starts
      - name: Prepare Jekyll Source 📋
        run: |
          cp dist/game.html website/play-stackers.html

      # 4. Build with Jekyll (Official Action)
      - name: Build with Jekyll 💎
        uses: actions/jekyll-build-pages@v1
        with:
          # Tell Jekyll that the site lives in the 'website' folder
          source: ./website/
          destination: ./_site

      # 5. Upload & Deploy
      - name: Upload artifact 🚀
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages 🚀
        id: deployment
        uses: actions/deploy-pages@v4
