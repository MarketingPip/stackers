name: Build Electron App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ✅ Manual install (fixed formatting + no duplicates)
      - name: Install dependencies
        run: |
          npm install --save-dev ^
            webpack ^
            webpack-cli ^
            webpack-dev-server ^
            html-webpack-plugin ^
            mini-css-extract-plugin ^
            css-loader ^
            style-loader ^
            postcss ^
            postcss-loader ^
            tailwindcss ^
            autoprefixer ^
            html-inline-script-webpack-plugin ^
            html-inline-css-webpack-plugin ^
            html-loader
        shell: cmd
        if: matrix.os == 'windows-latest'

      - name: Install dependencies (Linux)
        run: |
          npm install --save-dev \
            webpack \
            webpack-cli \
            webpack-dev-server \
            html-webpack-plugin \
            mini-css-extract-plugin \
            css-loader \
            style-loader \
            postcss \
            postcss-loader \
            tailwindcss \
            autoprefixer \
            html-inline-css-webpack-plugin \
            html-inline-script-webpack-plugin \
            html-loader
        if: matrix.os == 'ubuntu-latest'

      # ✅ Build (cross-platform env)
      - name: Build Windows
        if: matrix.os == 'windows-latest'
        run: |
          set NODE_ENV=production && npm run build:exe -- --publish=never --win portable --ia32
        shell: cmd

      - name: Build Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          NODE_ENV=production npm run build:exe -- --publish=never

      # ✅ Upload artifacts (OS-specific)
      - name: Upload Windows artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: stacker-windows
          path: |
            dist/**/*.exe
         #   dist/**/*.zip

      - name: Upload Linux artifacts
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: stacker-linux
          path: |
            dist/**/*.AppImage
            dist/**/*.deb
            dist/**/*.tar.gz
