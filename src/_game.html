<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>STACKER</title>
<style>
  
  * { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  overflow:hidden;
}
#wrap { position:relative; display:flex; align-items:flex-start; gap:16px; }

/* Hide side panel on smaller screens */
@media (max-width: 900px) {
  #side {
    display: none;
  }
}
  canvas {
    display:block;
    image-rendering:pixelated;
    cursor:pointer;
  }
  /* Side panel */
  #side {
    width:140px;
    color:#4af;
    font-size:11px;
    line-height:1.8;
  }
  #side h3 { color:#ff4; margin-bottom:6px; font-size:12px; letter-spacing:2px; }
  #side .ev {
    background:#001133;
    border:1px solid #4af3;
    border-radius:4px;
    padding:4px 6px;
    margin:3px 0;
    color:#8df;
    font-size:10px;
    transition:background 0.2s;
  }
  #side .ev.fired { background:#004488; color:#fff; }
  #side .sep { border-top:1px solid #4af3; margin:8px 0; }
  #side .label { color:#4af8; font-size:10px; }
  .hidden {display: none}
  
  
  #rotateBtn {
  position: fixed;
  bottom: 10px;
  right: 120px;
  background: #001133;
  color: #4af;
  border: 1px solid #4af;
  padding: 6px 10px;
  font-family: monospace;
  cursor: pointer;
  z-index: 10;
}

#fsBtn {
  position: fixed;
  bottom: 10px;
  right: 10px;
  background: #001133;
  color: #4af;
  border: 1px solid #4af;
  padding: 6px 10px;
  font-family: monospace;
  cursor: pointer;
  z-index: 10;
}
#devBtn {
 position: fixed;
  bottom: 10px;
  right: 200px;
  background: #001133;
  color: #4af;
  border: 1px solid #4af;
  padding: 6px 10px;
  font-family: monospace;
  cursor: pointer;
  z-index: 10;
}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="side" class="hidden dev-panel">
    <h3>EVENTS</h3>
    <div class="label">Game</div>
    <div class="ev" id="ev-insert">INSERT COIN</div>
    <div class="ev" id="ev-start">GAME START</div>
    <div class="ev" id="ev-place">BLOCK PLACED</div>
    <div class="ev" id="ev-miss">MISS</div>
    <div class="ev" id="ev-gameover">GAME OVER</div>
    <div class="sep"></div>
    <div class="label">Prizes</div>
    <div class="ev" id="ev-minor">MINOR PRIZE</div>
    <div class="ev" id="ev-major">MAJOR PRIZE ★</div>
    <div class="sep"></div>
    <div class="label">Arduino / Hook</div>
    <div style="font-size:9px;color:#4af6;line-height:1.6">
      Listen via:<br>
      <code style="color:#8df">window.addEventListener<br>('stacker', e =><br>console.log(e.detail))</code>
    </div>
    <div class="sep"></div>
    <div class="label">Sound Files</div>
    <div style="font-size:9px;color:#4af6;line-height:1.6">
      Drop MP3s into<br><code style="color:#8df">./sfx/</code> folder &amp;<br>enable in config.
    </div>
  </div>
</div>


  <button id="rotateBtn">ROTATE</button>
  <button id="fsBtn">FULLSCREEN</button>
  <button   id="devBtn">FULLSCREEN</button>

  <!--- Script is inlined via webpack---> 
  
</body> 
</html>
