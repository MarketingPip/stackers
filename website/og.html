<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>OpenStacker — Social Preview Card</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Space+Grotesk:wght@700&display=swap');
    :root{
      --bg:#0F172A; /* dark navy */
      --primary:#8B5CF6; /* vivid purple */
      --secondary:#EC4899; /* hot pink */
      --accent:#22D3EE; /* cyan */
      --muted:#64748b;
      --glass: rgba(255,255,255,0.05);
    }
    html,body{height:100%;margin:0;}
    body{
      background-color: var(--bg);
      background-image: radial-gradient(circle at 20% 20%, rgba(139, 92, 246, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 80% 80%, rgba(34, 211, 238, 0.1) 0%, transparent 40%);
      display:flex;align-items:center;justify-content:center;
      font-family: 'Inter', system-ui, sans-serif;
    }
    .preview{
      width:1200px;height:630px;border-radius:24px;
      box-shadow:0 40px 100px rgba(0,0,0,0.8);
      overflow:hidden;display:flex;position:relative;padding:60px;box-sizing:border-box;
      background: #0b0f1a;
      border: 1px solid rgba(255,255,255,0.1);
    }
    
    /* Left Content */
    .left{flex:1.2;display:flex;flex-direction:column;gap:24px;justify-content:center;z-index:10}
    .logo-area{display:flex;align-items:center;gap:16px}
    .icon-box{
      width:70px;height:70px;border-radius:14px;
      background: var(--primary);
      display:flex;align-items:center;justify-content:center;
      box-shadow: 0 0 20px rgba(139, 92, 246, 0.4);
    }
    .title{
      font-family: 'Space Grotesk', sans-serif;
      font-size:56px;font-weight:800;color:#fff;
      letter-spacing:-0.03em; text-transform: uppercase; font-style: italic;
    }
    .subtitle{font-size:22px;color:var(--accent);font-weight:600;margin-top:-10px}
    .desc{color:#94a3b8;font-size:18px;line-height:1.5;max-width:540px}
    
    /* Right Content - The Game Grid Visual */
    .right{flex:1;display:flex;align-items:center;justify-content:center;position:relative}
    .game-viewport{
      width:320px;height:440px;
      background:#050810; border-radius:16px;
      border: 4px solid #1e293b; position:relative;
      overflow:hidden; box-shadow: 0 0 50px rgba(0,0,0,0.5);
    }
    .grid-pattern{
      position:absolute; inset:0;
      background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), 
                        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .stack{
      position:absolute; bottom:20px; left:50%; transform:translateX(-50%);
      display:flex; flex-direction:column; gap:4px;
    }
    .row{display:flex; gap:4px; justify-content:center}
    .block{width:60px; height:30px; border-radius:4px}
    .block.p{background: var(--primary); box-shadow: 0 0 15px var(--primary)}
    .block.s{background: var(--secondary); opacity: 0.8}
    .block.a{background: var(--accent); box-shadow: 0 0 15px var(--accent)}

    /* Badges & Meta */
    .meta{display:flex;gap:12px;margin-top:10px}
    .badge{
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      padding:8px 16px; border-radius:8px; color:#fff; font-weight:700; font-size:14px;
    }
    .badge-neon{ border-color: var(--secondary); color: var(--secondary); }

    .footer{
      position:absolute; left:60px; bottom:50px;
      display:flex; align-items:center; gap:20px;
    }
    .github-slug{
      font-family: monospace; color: var(--muted); font-size: 16px;
    }

    /* Floating accents */
    .glow-dot{
      position:absolute; width:150px; height:150px; 
      background: var(--primary); filter: blur(100px); opacity:0.2;
    }
  </style>
</head>
<body>
  <div class="preview">
    <div class="glow-dot" style="top:-50px; right:-50px"></div>
    
    <div class="left">
      <div class="logo-area">
        <div class="icon-box">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m7 11 2-2-2-2"/><path d="M11 13h4"/><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/></svg>
        </div>
        <div>
          <div class="title">OpenStacker</div>
          <div class="subtitle">Open Source Arcade Stacking</div>
        </div>
      </div>

      <div class="desc">A "true-skill" tribute to the classic arcade experience. No rigged payout logic—just pure physics and timing. Fully customizable for DIY cabinet builds.</div>

      <div class="meta">
        <div class="badge badge-neon">v1.2.0</div>
        <div class="badge">Arduino Support</div>
        <div class="badge">Cross-Platform</div>
      </div>
    </div>

    <div class="right">
      <div class="game-viewport">
        <div class="grid-pattern"></div>
        <div class="stack">
          <div class="row"><div class="block a"></div></div>
          <div class="row" style="opacity:0.4"><div class="block s"></div><div class="block s"></div></div>
          <div class="row"><div class="block p"></div><div class="block p"></div><div class="block p"></div></div>
          <div class="row"><div class="block p"></div><div class="block p"></div><div class="block p"></div></div>
          <div class="row"><div class="block p"></div><div class="block p"></div><div class="block p"></div></div>
        </div>
      </div>
    </div>

    <div class="footer">
      <div class="github-slug">github.com/YourUsername/OpenStacker</div>
      <div style="width:1px; height:14px; background:rgba(255,255,255,0.1)"></div>
      <div class="github-slug" style="color:var(--accent)">100% Skill-Based Logic</div>
    </div>
  </div>
</body>
</html>
