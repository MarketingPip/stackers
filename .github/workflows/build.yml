name: Build Electron App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build main and renderer
        run: |
          npx esbuild src/main.js --bundle --platform=node --minify --outfile=dist/main.js --log-level=error
          npx esbuild src/index.js --bundle --minify --outfile=dist/app.js --log-level=error

      - name: Package Electron App
        run: |
          if [ "${{ runner.os }}" == "Windows" ]; then
            npx electron-builder --win portable --ia32 --publish=never
          else
            npx electron-builder --linux AppImage --publish=never
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stacker-${{ matrix.os }}
          path: dist/*.exe
