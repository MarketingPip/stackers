name: Deploy Website to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Ensure root lockfile exists 🛠️
        run: |
          if [ ! -f package-lock.json ]; then
            npm i --package-lock-only
          fi

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 1. Build the Game
      - name: Build Game 🎮
        run: |
          npm install
          npx webpack --config ./src/webpack.config.js

      # 2. Build Website Assets
      - name: Build Website 🏗️
        working-directory: website
        run: |
          npm install
          npm run build:ghpages

      # 3. Create Clean Staging & Force Jekyll Processing
      - name: Prepare Final Files 📂
        run: |
          mkdir final_site
          
          # Move only what you want
          cp dist/game.html final_site/play-stackers.html
          cp -r website/dist/* final_site/

      # 4. Build with Jekyll (Official Action)
      - name: Build with Jekyll 💎
        uses: actions/jekyll-build-pages@v1
        with:
          # We point Jekyll ONLY to the clean folder
          source: ./final_site/
          destination: ./_site

      # 5. Upload artifact
      - name: Upload artifact 🚀
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages 🚀
        uses: actions/deploy-pages@v4
