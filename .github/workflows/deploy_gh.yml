name: Deploy Website to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      # 1. Setup Node for the Webpack Game Build
      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies and Build Game 🎮
        run: |
          npm install
          npx webpack --config ./src/webpack.config.js

      # 2. Setup Ruby for Jekyll
      - name: Setup Ruby 💎
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2' # Standard for 2026
          bundler-cache: true
          working-directory: website

      # 3. Build the Jekyll Website
      - name: Build Website with Jekyll 🏗️
        run: |
          # Move the game build into the Jekyll source folder so Jekyll processes it
          mkdir -p website/
          cp dist/game.html website/play-stackers.html
          
          # Run Jekyll build
          cd website
          bundle install
          bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      # 4. Deploy to gh-pages branch
      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: website/_site  # Jekyll outputs to _site by default
          branch: gh-pages
          clean: true
