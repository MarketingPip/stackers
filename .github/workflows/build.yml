name: Build and Publish Stackers Game

on:
  push:
    tags:
      - 'v*' # Triggers on version tags like v1.0.0
  workflow_dispatch: # Allows manual triggering

permissions:
  contents: write # REQUIRED to create a release

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm install
          npm install -g @neutralinojs/neu
      # ✅ Build step - Note we removed --publish=never so builder can prep files
      - name: Build Electron App
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            npm run build:exe
          else
            npm run build:exe
          fi
        shell: bash


      # Generate the ESM Library from CommonJS source
      - name: Build ESM Library
        run: npm run build:library

      # Commit the ESM bundle (Only runs on Linux to avoid duplicates)
      - name: Commit ESM Library
        if: matrix.os == 'ubuntu-latest'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add dist/game.js
          # Only commit if there are changes to avoid workflow failure
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update esm library bundle [skip ci]" && git push)
        shell: bash

      # ✅ Upload to a single release (This action handles the release creation)
      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
            dist/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
