name: Deploy Website to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Ensure root lockfile exists 🛠️
        run: |
          if [ ! -f package-lock.json ]; then
            npm i --package-lock-only
          fi

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 1. Build the Game
      - name: Build Game 🎮
        run: |
          npm install
          npx webpack --config ./src/webpack.config.js

      # 2. Build Website Assets (Webpack)
      - name: Build Webpack Assets 🏗️
        working-directory: website
        run: |
          npm install
          npm run build:ghpages

      # 3. Setup Ruby for Jekyll
      - name: Setup Ruby 💎
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: website

      # 4. Process everything through Jekyll
      - name: Jekyll Build 💎
        run: |
          # Copy the game file into the website folder so Jekyll processes it
          cp dist/game.html website/play-stackers.html
          
          cd website
          # Build the site. 
          # Jekyll will parse the variables in your Webpack HTML and play-stackers.html
          bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      # 5. Clean Deploy
      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          # Point ONLY to the result of the Jekyll build
          folder: website/_site
          branch: gh-pages
          clean: true
