name: Deploy Website to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write      # Required for official deployment
  id-token: write   # Required for official deployment

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Ensure Lockfile exists 🛠️
        run: |
          if [ ! -f website/package-lock.json ]; then
            npm i --package-lock-only
          fi
        working-directory: website

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies 🔧
        run: npm install
        working-directory: website

      - name: Build project 🏗️
        run: npm run build:ghpages
        working-directory: website

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-and-deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
        # Specify the target branch for GitHub Pages deployment
            branch: gh-pages
        # Specify the directory containing the built static files
            folder: website/dist # Or the folder where your Jekyll build output is stored
            clean: true
