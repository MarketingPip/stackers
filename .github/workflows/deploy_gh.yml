name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Ensure Lockfile exists 🛠️
        # Note the 'working-directory' and the path check
        run: |
          if [ ! -f website/package-lock.json ]; then
            echo "No lockfile found in website folder. Generating..."
            npm i --package-lock-only
          fi
        working-directory: website

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          # This tells the cache to look for the lockfile inside 'website'
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies 🔧
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
        working-directory: website

      - name: Build project 🏗️
        run: npm run build:ghpages
        working-directory: website

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          # Assuming Webpack outputs to 'website/dist'
          folder: website/dist 
          branch: gh-pages
