name: Build and Publish Electron App

on:
  push:
    tags:
      - 'v*' # Triggers on version tags like v1.0.0
  workflow_dispatch: # Allows manual triggering

permissions:
  contents: write # REQUIRED to create a release

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4


      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      # 1. Force permissions on the entire app-builder-bin directory
      - name: Fix permissions (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          find node_modules/app-builder-bin/linux -type f -name "app-builder" -exec chmod +x {} +

      # 2. Build with specific flags to ignore the "Draft vs Release" conflict
      - name: Build Electron App
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            # Windows shell handles arguments differently; using bash for consistency
            npm run build:exe -- --win portable --ia32 --publish never
          else
            # Explicitly tell it NOT to try and publish to GitHub itself
            # This avoids the "existing type not compatible" error
            npm run build:exe -- --linux appimage deb --publish never
          fi
        shell: bash

      # 3. Use the dedicated release action (much more reliable)
      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
          # Use 'true' to append files to the existing v1.0.0 release
          append_body: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
