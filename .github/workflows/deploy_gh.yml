name: Deploy Website to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Ensure root lockfile exists 🛠️
        run: |
          if [ ! -f package-lock.json ]; then
            npm i --package-lock-only
          fi

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 1. Build the Webpack Game
      - name: Install dependencies and Build Game 🎮
        run: |
          npm install
          npx webpack --config ./src/webpack.config.js

      # 2. Setup Ruby for Jekyll
      - name: Setup Ruby 💎
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: website

      # 3. Build the Jekyll Site
      - name: Build Website 🏗️
        run: |
          # Move game output into Jekyll source folder BEFORE Jekyll builds
          # Using -p ensures it doesn't fail if directory exists
          cp dist/game.html website/play-stackers.html
          
          # Install JS deps for the website folder if needed
          cd website
          npm install
          npm run build:ghpages
          
          # Run Jekyll build
          bundle exec jekyll build
        env:
          JEKYLL_ENV: production
          PAGES_REPO_NWO: ${{ github.repository }} # This provides "username/repo"

      # 4. Final Prep and Deploy
      - name: Create .nojekyll file 📄
        run: touch website/_site/.nojekyll

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          # FIXED: Point to the actual Jekyll output directory
          folder: website/_site
          branch: gh-pages
          clean: true
