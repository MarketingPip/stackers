name: Build Electron App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --save-dev html-loader style-loader esbuild html-webpack-plugin html-inline-css-webpack-plugin html-inline-script-webpack-plugin

      - name: Build Windows (32 + 64 bit)
        if: matrix.os == 'windows-latest'
        run: |
          set NODE_ENV=production
          npm run build:exe -- --publish=never --win portable --ia32
        shell: cmd

      - name: Build Linux (32 + 64 bit)
        if: matrix.os == 'ubuntu-latest'
        run: |
          export NODE_ENV=production
          npm run build:exe -- --publish=never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stacker-${{ matrix.os }}
          path: dist/*.exe
